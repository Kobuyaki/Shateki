<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>射的ゲーム</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>射的ゲーム</h1>
        <div class="info-panel">
            <div class="info-item">スコア: <span id="score">0</span></div>
            <div class="info-item">残り時間: <span id="timer">30</span>秒</div>
        </div>
        
        <div class="game-area" id="game-area">
            <div id="custom-cursor"></div>
            
            <button id="start-btn">ゲームスタート</button>
        </div>
        <p class="instruction">画面をドラッグして照準を動かし、離してシュート！<br>文字サイズを変更してから遊んでください。</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
